[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"

[tool.ruff]
# Forward-reference type names used in `Mapped["X"]` relationship and
# parameter annotations; ruff cannot resolve them without the import graph.
builtins = ["Document", "ChunkEmbedding", "RerankerService"]

[tool.ruff.lint]
# SQLAlchemy uses `column == None` and `column == True` to express
# IS NULL / IS TRUE in query filters. Ruff flags these as E711/E712, but
# they are correct ORM syntax (not Python comparisons), so ignore them.
ignore = ["E711", "E712"]

[tool.ruff.lint.per-file-ignores]
# Package __init__.py files re-export their public API surface; "unused"
# imports there are intentional and should not be flagged as F401.
"**/__init__.py" = ["F401"]
# Test suite carries accepted unused-import / redefinition debt (tracked as
# P2 lint debt); these are non-blocking for production correctness.
"tests/**" = ["F401", "F841", "F811"]
