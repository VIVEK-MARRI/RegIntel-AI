name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v1.0.0)"
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: ${{ github.repository_owner }}

jobs:
  release:
    name: Build + publish multi-arch images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            context: .
            dockerfile: Dockerfile.production
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile.production

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/regintel-${{ matrix.service.name }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/regintel-${{ matrix.service.name }}:latest
          labels: |
            org.opencontainers.image.title=regintel-${{ matrix.service.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.value }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/regintel-${{ matrix.service.name }}:${{ steps.tag.outputs.value }}
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service.name }}.sarif

  release-notes:
    name: Publish release notes
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-creatordate | sed -n '2p')
          echo "## Changes since ${PREV}" > CHANGELOG.md
          git log "${PREV}..${TAG}" --pretty=format:"- %s" >> CHANGELOG.md || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          generate_release_notes: true
          fail_on_unmatched_files: false
