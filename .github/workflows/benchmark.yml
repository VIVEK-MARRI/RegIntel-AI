name: Benchmark

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Benchmark suite (smoke|quick|standard|full)"
        required: true
        default: standard
        type: choice
        options:
          - smoke
          - quick
          - standard
          - full
  schedule:
    # Weekly: Sunday 02:00 UTC
    - cron: "0 2 * * 0"

permissions:
  contents: read

env:
  PYTHON: "3.11"

jobs:
  benchmark:
    name: ${{ github.event.inputs.suite || 'scheduled' }} benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest==9.0.3 httpx==0.28.1

      - name: Run benchmarks
        env:
          ENV: test
          BENCH_OUTPUT_DIR: benchmarks/reports
        run: |
          SUITE="${{ github.event.inputs.suite || 'standard' }}"
          mkdir -p "$BENCH_OUTPUT_DIR"
          python -m app.benchmark.cli --suite "${SUITE}" --output "${BENCH_OUTPUT_DIR}/run.json"

      - name: Generate reports
        if: always()
        run: |
          python -m app.benchmark.cli report \
            --input benchmarks/reports/run.json \
            --out-dir benchmarks/reports

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.run_id }}
          path: |
            benchmarks/reports/run.json
            benchmarks/reports/latency_report.json
            benchmarks/reports/cost_report.json
            benchmarks/reports/agent_performance_report.json
            benchmarks/reports/system_performance_report.json
            benchmarks/reports/summary.md
            benchmarks/reports/summary.html

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'benchmarks/reports/summary.md';
            if (!fs.existsSync(path)) {
              core.info('No summary.md found, skipping comment');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## Benchmark report\n\n' + body
            });
