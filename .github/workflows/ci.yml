name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Fail-fast on matrix-wide cancel.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON: "3.11"
  NODE: "20"

jobs:
  # ─── 1. Lint ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.7.4 mypy==1.13.0

      - name: Ruff (lint)
        run: ruff check app tests

      - name: Ruff (format check)
        run: ruff format --check app tests

      - name: mypy (type-check)
        continue-on-error: false
        run: |
          mypy --version
          # Type-check is a "best effort" gate — the project is migrating to strict.
          mypy --ignore-missing-imports --no-strict-optional app/benchmark || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run lint
          npm run typecheck

      - name: Structural checks
        run: |
          # P1.2: ensure vite.config.js (duplicate) has not re-appeared.
          if [ -f "frontend/vite.config.js" ]; then
            echo "ERROR: frontend/vite.config.js must not exist (duplicate of vite.config.ts)."
            exit 1
          fi
          # P1.1: ensure stale org reference is not present in any Dockerfile.
          if grep -r "anomalyco" . --include="Dockerfile*" -l; then
            echo "ERROR: stale 'anomalyco' org reference found in a Dockerfile."
            exit 1
          fi
          echo "Structural checks passed."

  # ─── 2. Unit tests (backend) ────────────────────────────────────────
  unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==9.0.3 pytest-asyncio==1.4.0 pytest-cov==7.1.0 coverage[toml]==7.14.1 httpx==0.28.1

      - name: Run unit tests
        env:
          ENV: test
          DATABASE_URL: "sqlite+aiosqlite:///./regintel_ci_test.db"
          DATABASE_URL_SYNC: "sqlite:///./regintel_ci_test.db"
          LLM_PROVIDER: "mock"
          RATE_LIMIT_PER_MINUTE: "100000"
        run: |
          pytest tests \
            --ignore=tests/test_e2e \
            --ignore=tests/test_ml \
            -q \
            --maxfail=20 \
            --cov=app \
            --cov-report=xml:coverage-backend.xml \
            --cov-report=json:coverage-backend.json \
            --cov-fail-under=80 \
            -o junit_family=xunit1 \
            --junitxml=junit-backend.xml
          echo "Actual coverage:"
          python -c "import json; d=json.load(open('coverage-backend.json')); print(f'{d[\"totals\"][\"percent_covered\"]:.1f}%')"

      - name: Upload coverage (backend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: |
            coverage-backend.xml
            coverage-backend.json
            junit-backend.xml

  # ─── 2b. Evaluation + analytics tests (previously excluded) ──────────
  evaluation-tests:
    name: Evaluation & analytics tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==9.0.3 pytest-asyncio==1.4.0 httpx==0.28.1

      - name: Run evaluation + analytics tests
        env:
          ENV: test
          DATABASE_URL: "sqlite+aiosqlite:///./regintel_eval_test.db"
          DATABASE_URL_SYNC: "sqlite:///./regintel_eval_test.db"
          LLM_PROVIDER: "mock"
          RATE_LIMIT_PER_MINUTE: "100000"
        run: |
          pytest tests/test_evaluation tests/test_analytics -q --maxfail=20

  # ─── 3. Unit tests (frontend) ──────────────────────────────────────────
  frontend-tests:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        env:
          NODE_ENV: production
        run: npm run build

      - name: Tests
        working-directory: frontend
        run: npm test -- --reporter=default --reporter=junit --outputFile.junit=./junit.xml

      - name: Upload coverage (frontend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: |
            frontend/coverage
            frontend/junit.xml

  # ─── 4b. E2E pipeline test ──────────────────────────────────────
  e2e-tests:
    name: End-to-end pipeline test
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==9.0.3 pytest-asyncio==1.4.0 httpx==0.28.1

      - name: Run E2E pipeline tests
        env:
          ENV: test
          DATABASE_URL: "sqlite+aiosqlite:///./regintel_e2e.db"
          DATABASE_URL_SYNC: "sqlite:///./regintel_e2e.db"
          LLM_PROVIDER: "mock"
          RATE_LIMIT_PER_MINUTE: "100000"
        run: |
          pytest tests/test_e2e -v --maxfail=5

  # ─── 4c. ML model integration tests ───────────────────────────────
  ml-tests:
    name: ML model integration (BGE)
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 45  # model download can be slow
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python deps (base + ML stack from requirements-ml.txt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ml.txt
          pip install pytest==9.0.3 pytest-asyncio==1.4.0

      - name: Run ML integration tests
        env:
          ENV: test
          LLM_PROVIDER: "mock"
          ML_INTEGRATION_TESTS: "1"
        run: |
          pytest tests/test_ml -v --maxfail=5

  # ─── 4d. Migration verification ──────────────────────────────────
  migrations:
    name: Alembic migration verification
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: regintel_migration_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/regintel_migration_test"
          DATABASE_URL_SYNC: "postgresql+psycopg2://postgres:postgres@localhost:5432/regintel_migration_test"
          ENV: test
        run: |
          alembic upgrade head

      - name: Check for model drift (alembic check)
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/regintel_migration_test"
          DATABASE_URL_SYNC: "postgresql+psycopg2://postgres:postgres@localhost:5432/regintel_migration_test"
          ENV: test
        run: |
          # alembic check returns non-zero if autogenerate would produce a diff.
          alembic check && echo "No model drift detected."

  # ─── 4. Integration / smoke ──────────────────────────────────────────
  integration:
    name: Integration smoke
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==9.0.3 pytest-asyncio==1.4.0 httpx==0.28.1

      - name: Boot the app and probe /health
        env:
          ENV: test
        run: |
          (uvicorn app.main:app --host 127.0.0.1 --port 8000 &) && \
            for i in $(seq 1 30); do
              curl -fsS http://127.0.0.1:8000/health/live >/dev/null && break
              sleep 1
            done
          curl -fsS http://127.0.0.1:8000/health/live | tee /tmp/live.json
          curl -fsS http://127.0.0.1:8000/health/ready | tee /tmp/ready.json
          test "$(jq -r .status /tmp/live.json)" = "healthy"
          test "$(jq -r .status /tmp/ready.json)" = "ready" || test "$(jq -r .status /tmp/ready.json)" = "degraded"

      - name: Run benchmark smoke
        env:
          ENV: test
        run: |
          python -m app.benchmark.cli --quick --output /tmp/bench.json
          test -f /tmp/bench.json
          jq -r '.summary.total_operations' /tmp/bench.json

      - name: API contract check (P1.5)
        env:
          ENV: test
        run: |
          python .github/scripts/check_api_contract.py \
            --base-url http://127.0.0.1:8000 \
            --services-dir frontend/src/services

  # ─── 5. Security scan ──────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install bandit==1.7.10 pip-audit==2.7.3
          pip install -r requirements.txt || true

      - name: Bandit
        run: bandit -q -r app -ll

      - name: pip-audit
        continue-on-error: true   # network-restricted environments
        run: pip-audit -r requirements.txt --strict

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  # ─── 6. Docker build smoke ────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: integration
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          tags: regintel/backend:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.production
          tags: regintel/frontend:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image sizes
        run: |
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" | grep regintel

  # ─── 7. Coverage reporting (sonar) ────────────────────────────────
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'push' || github.event_name == 'pull_request')
    needs: [unit-tests, frontend-tests]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: artifacts/backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: artifacts/frontend

      - name: Summarise
        run: |
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          BACKEND_PCT=$(jq -r '.totals.percent_covered // "n/a"' artifacts/backend/coverage-backend.json 2>/dev/null || echo "n/a")
          echo "| Component | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${BACKEND_PCT}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Backend coverage: ${BACKEND_PCT}%"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: artifacts/backend/coverage-backend.xml
          flags: backend
          name: regintel-backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
