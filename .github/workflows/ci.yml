name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Fail-fast on matrix-wide cancel.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON: "3.11"
  NODE: "20"

jobs:
  # ─── 1. Lint ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.7.4 mypy==1.13.0

      - name: Ruff (lint)
        run: ruff check app tests

      - name: Ruff (format check)
        run: ruff format --check app tests

      - name: mypy (type-check)
        continue-on-error: false
        run: |
          mypy --version
          # Type-check is a "best effort" gate — the project is migrating to strict.
          mypy --ignore-missing-imports --no-strict-optional app/benchmark || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run lint
          npm run typecheck

  # ─── 2. Unit tests (backend) ────────────────────────────────────────
  unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==9.0.3 pytest-asyncio==1.4.0 pytest-cov==7.1.0 coverage[toml]==7.14.1 httpx==0.28.1

      - name: Run unit tests
        env:
          ENV: test
        run: |
          pytest tests \
            --ignore=tests/test_evaluation \
            --ignore=tests/test_analytics \
            -q \
            --maxfail=10 \
            --cov=app \
            --cov-report=xml:coverage-backend.xml \
            --cov-report=json-summary:coverage-backend.json \
            --cov-fail-under=40 \
            -o junit_family=xunit1 \
            --junitxml=junit-backend.xml

      - name: Upload coverage (backend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: |
            coverage-backend.xml
            coverage-backend.json
            junit-backend.xml

  # ─── 3. Unit tests (frontend) ───────────────────────────────────────
  frontend-tests:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        env:
          NODE_ENV: production
        run: npm run build

      - name: Tests
        working-directory: frontend
        run: npm test -- --reporter=default --reporter=junit --outputFile.junit.xml=false

      - name: Upload coverage (frontend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: |
            frontend/coverage
            frontend/junit.xml

  # ─── 4. Integration / smoke ────────────────────────────────────────
  integration:
    name: Integration smoke
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==9.0.3 pytest-asyncio==1.4.0 httpx==0.28.1

      - name: Boot the app and probe /health
        env:
          ENV: test
        run: |
          (uvicorn app.main:app --host 127.0.0.1 --port 8000 &) && \
            for i in $(seq 1 30); do
              curl -fsS http://127.0.0.1:8000/health/live >/dev/null && break
              sleep 1
            done
          curl -fsS http://127.0.0.1:8000/health/live | tee /tmp/live.json
          curl -fsS http://127.0.0.1:8000/health/ready | tee /tmp/ready.json
          test "$(jq -r .status /tmp/live.json)" = "healthy"
          test "$(jq -r .status /tmp/ready.json)" = "ready" || test "$(jq -r .status /tmp/ready.json)" = "degraded"

      - name: Run benchmark smoke
        env:
          ENV: test
        run: |
          python -m app.benchmark.cli --quick --output /tmp/bench.json
          test -f /tmp/bench.json
          jq -r '.summary.total_operations' /tmp/bench.json

  # ─── 5. Security scan ──────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install bandit==1.7.10 pip-audit==2.7.3
          pip install -r requirements.txt || true

      - name: Bandit
        run: bandit -q -r app -ll

      - name: pip-audit
        continue-on-error: true   # network-restricted environments
        run: pip-audit -r requirements.txt --strict

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  # ─── 6. Docker build smoke ────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: integration
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          tags: regintel/backend:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.production
          tags: regintel/frontend:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image sizes
        run: |
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" | grep regintel

  # ─── 7. Coverage reporting (sonar) ────────────────────────────────
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'push' || github.event_name == 'pull_request')
    needs: [unit-tests, frontend-tests]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: artifacts/backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: artifacts/frontend

      - name: Summarise
        run: |
          echo "Backend coverage:"
          jq -r '.totals.percent_covered // "n/a"' artifacts/backend/coverage-backend.json
          echo "Frontend coverage: see artifact"
          ls -la artifacts/frontend || true
