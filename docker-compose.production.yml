# RegIntel AI — Production docker-compose (M10.3)
# Two services: backend (FastAPI) and frontend (Nginx SPA).
# Use: `docker compose -f docker-compose.production.yml up -d`
#
# Pre-requisites (in the same directory as this file):
#   .env.production         — runtime secrets (gitignored)
#   ./nginx.conf            — already committed
#   ./storage               — persistent data (mounted as a named volume)

name: regintel

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

services:
  # ─── Backend (FastAPI) ──────────────────────────────────────────────
  backend:
    <<: *default-restart
    build:
      context: .
      dockerfile: Dockerfile.production
    image: regintel/backend:1.0.0
    container_name: regintel-backend
    env_file:
      - .env.production
    environment:
      ENV: production
      PORT: "8000"
      WORKERS: "2"
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8000:8000"   # bound to loopback; nginx reaches it via the internal network
    volumes:
      - regintel_storage:/var/lib/regintel/storage
      - regintel_logs:/var/log/regintel
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - regintel_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: false
    tmpfs:
      - /tmp:size=64m
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    stop_grace_period: 30s

  # ─── Frontend (Nginx SPA) ──────────────────────────────────────────
  frontend:
    <<: *default-restart
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    image: regintel/frontend:1.0.0
    container_name: regintel-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - regintel_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    stop_grace_period: 10s

# ─── Networks ──────────────────────────────────────────────────────
networks:
  regintel_net:
    driver: bridge
    name: regintel_net
    ipam:
      config:
        - subnet: 172.30.0.0/24

# ─── Volumes ───────────────────────────────────────────────────────
volumes:
  regintel_storage:
    name: regintel_storage
    driver: local
  regintel_logs:
    name: regintel_logs
    driver: local
