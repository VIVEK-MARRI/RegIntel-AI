# RegIntel AI — Nginx Production Config (M10.3)
# - Serves the SPA on port 80 (TLS terminates at the upstream proxy / load balancer)
# - Reverse-proxies /api/* to the FastAPI backend
# - Long-cache hashed assets, no-cache index.html
# - Security headers, gzip, rate limiting

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ─── MIME & charset ────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # ─── Logging ───────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    'request_id=$request_id '
                    'req="$request" status=$status '
                    'bytes=$body_bytes_sent rt=$request_time ut="$upstream_response_time" '
                    'ref="$http_referer" ua="$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ──────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;
    client_max_body_size 25m;
    large_client_header_buffers 4 16k;

    # ─── Gzip ─────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ─── Rate limiting (per IP) ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=static_rl:10m rate=200r/s;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ─── Upstream: FastAPI ────────────────────────────────────────────
    upstream regintel_backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # ─── Server block ────────────────────────────────────────────────
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        # Security headers
        add_header X-Frame-Options           "SAMEORIGIN"             always;
        add_header X-Content-Type-Options    "nosniff"                always;
        add_header X-XSS-Protection          "1; mode=block"          always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        # CSP: allow inline styles for React, self for everything else, no eval.
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

        # Per-IP connection / request limits
        limit_conn conn_per_ip 50;

        # ─── Hashed Vite assets: cache forever ──────────────────────
        location /assets/ {
            limit_req zone=static_rl burst=400 nodelay;
            root   /usr/share/nginx/html;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            add_header X-Cache-Status "STATIC" always;
            try_files $uri =404;
        }

        # ─── Service worker, manifest, favicon ──────────────────────
        location = /sw.js {
            root /usr/share/nginx/html;
            access_log off;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header X-Cache-Status "SW" always;
        }
        location = /favicon.ico { root /usr/share/nginx/html; access_log off; log_not_found off; }
        location = /robots.txt  { root /usr/share/nginx/html; access_log off; log_not_found off; }

        # ─── API reverse proxy ──────────────────────────────────────
        location /api/ {
            limit_req zone=api_rl burst=60 nodelay;

            proxy_pass         http://regintel_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
            proxy_buffers         16 16k;
            proxy_busy_buffers_size 32k;

            # Streaming support (SSE)
            proxy_cache         off;
            proxy_set_header    X-Accel-Buffering no;
        }

        # ─── OpenAPI / docs (no-cache) ──────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass         http://regintel_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ─── Landing page ───────────────────────────────────────────
        location /landing/ {
            alias     /usr/share/nginx/landing/;
            index     index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header X-Cache-Status "LANDING" always;
        }

        # ─── SPA fallback ───────────────────────────────────────────
        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header X-Cache-Status "INDEX" always;
        }

        # ─── Custom error pages ─────────────────────────────────────
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
