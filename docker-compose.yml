name: regintel-dev

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: regintel-db
    environment:
      POSTGRES_USER: regintel
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: regintel
    ports:
      - "5432:5432"
    networks:
      - regintel_net
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regintel -d regintel"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    image: regintel/backend:dev
    container_name: regintel-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./regintel_dev.db:/app/regintel_dev.db
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - regintel_net
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G

  frontend:
    image: nginx:1.27-alpine
    container_name: regintel-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./landing:/usr/share/nginx/landing:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - regintel_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

networks:
  regintel_net:
    driver: bridge
    name: regintel_net
